[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nextcloud-talk-mcp"
version = "1.0.0"
description = "MCP server wrapping the Nextcloud Talk (Spreed) OCS API"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Patrick Leiverkus" }]
keywords = [
    "nextcloud",
    "talk",
    "spreed",
    "mcp",
    "model-context-protocol",
    "claude",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications :: Chat",
]
dependencies = [
    "fastmcp>=0.2",
    "nextcloud-talk-core",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.9",
    "build>=1.0",
]

[project.scripts]
nextcloud-talk-mcp = "nextcloud_talk_mcp.server:main"

[project.urls]
Homepage = "https://github.com/leiverkus/nextcloud-talk-mcp"
Repository = "https://github.com/leiverkus/nextcloud-talk-mcp"
Issues = "https://github.com/leiverkus/nextcloud-talk-mcp/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["nextcloud_talk_mcp"]

[tool.coverage.report]
show_missing = true

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]
