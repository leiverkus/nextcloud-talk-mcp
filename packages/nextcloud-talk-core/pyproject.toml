[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nextcloud-talk-core"
version = "1.0.0"
description = "Reusable, MCP-free OCS client for the Nextcloud Talk (Spreed) API"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Patrick Leiverkus" }]
keywords = ["nextcloud", "talk", "spreed", "ocs", "client"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications :: Chat",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.9",
    "build>=1.0",
]

[project.urls]
Homepage = "https://github.com/leiverkus/nextcloud-talk-mcp"
Repository = "https://github.com/leiverkus/nextcloud-talk-mcp"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
nextcloud_talk_core = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["nextcloud_talk_core"]

[tool.coverage.report]
show_missing = true

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]
