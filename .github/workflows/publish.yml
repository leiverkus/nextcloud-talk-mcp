name: Publish

# Publishes both packages to PyPI via Trusted Publishing (OIDC) — no API token
# is stored. Triggered when a GitHub Release is published.
#
# One-time setup on PyPI (per project): register a Trusted Publisher with
#   owner   = leiverkus
#   repo    = nextcloud-talk-mcp
#   workflow = publish.yml
#   environment = pypi
# for BOTH projects: nextcloud-talk-core and nextcloud-talk-mcp.
#
# Ordering matters: the core is published first because the MCP server depends
# on it. Both jobs are idempotent — if a version already exists on PyPI the
# upload is skipped (skip-existing), so re-running a release is safe.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-core:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build packages/nextcloud-talk-core --outdir dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  publish-mcp:
    needs: publish-core
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build packages/nextcloud-talk-mcp --outdir dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
