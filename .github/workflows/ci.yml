name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e packages/nextcloud-talk-core -e packages/nextcloud-talk-mcp
      - run: pip install pytest pytest-cov
      # Packages are tested separately: both have a top-level `tests` package,
      # so a single pytest invocation can't import both.
      - name: Test core
        run: pytest packages/nextcloud-talk-core/tests --cov=nextcloud_talk_core --cov-report=term-missing
      - name: Test mcp
        run: pytest packages/nextcloud-talk-mcp/tests --cov=nextcloud_talk_mcp --cov-report=term-missing
      - name: Smoke script imports and reaches config check
        # Catches import/wiring drift in scripts/smoke_live.py (it isn't covered
        # by the unit tests). With no env vars it must exit 2 at the config
        # check — any other exit (e.g. ImportError → 1) fails the job. The `if`
        # captures the exit code without tripping the shell's errexit.
        run: |
          if env -u NC_URL -u NC_USER -u NC_APP_PASSWORD python scripts/smoke_live.py; then rc=0; else rc=$?; fi
          test "$rc" -eq 2 || { echo "expected exit 2 (config error), got $rc"; exit 1; }

  git-install-verify:
    # Verifies the real Git-install path the bridge repo relies on:
    # `pip install "git+...#subdirectory=packages/nextcloud-talk-core"`.
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Install core from this commit via Git URL
        run: |
          pip install "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git@${GITHUB_SHA}#subdirectory=packages/nextcloud-talk-core"
      - name: Import the public API
        run: python -c "from nextcloud_talk_core import TalkClient, Settings, Conversation, Message; print('core git-install OK')"
